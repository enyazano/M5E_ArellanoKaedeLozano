{% load static %}

<html>
    <head>
        <title>The List</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons">
        <link rel="stylesheet" href="{% static '/bootstrap/css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static '/bootstrap/css/custom.css' %}">

        <script src="{% static '/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    </head>

    <body>
        <nav class="navbar navbar-dark bg-custom mb-0 sticky-top" style="background-color: #590404;">
            <div class="container-fluid">
                <a class="navbar-brand mb-0" href="{% url 'view_menu' %}">My Tapas Menu</a>

                <a href="{% url 'add_menu' %}" style="color:white; text-decoration:none;">
                    <i class="material-icons" style="font-size: 32px;">add</i>
                </a>
            </div>
        </nav>

        <div class="container mt-4 mb-5">
            <div class="row">
                {% block content %}
                {% endblock %}
            </div>
        </div>

        <footer class="footer bg-custom text-center" style="background-color: #590404;">
            <div class="container text-white py-2">&copy; 2020</div>
        </footer>

    </body>
</html>
