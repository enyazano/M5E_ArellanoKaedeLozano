{% extends 'tapasapp/base.html' %}
{% load static %}

{% block sidebar %}
<a href="#" class="list-group-item list-group-item-action">View Wines</a>
<a href="#" class="list-group-item list-group-item-action">View Large Dishes</a>
<a href="#" class="list-group-item list-group-item-action">View Coursed Menus</a>
{% endblock %}


{% block content %}
<div class="col-12">
    <table class="table table-striped">
        <thead >
            <tr>
                <th class="table-dark" scope="col"> Name </th>
                <th class="table-dark" scope="col"> Cooking Time </th>
                <th class="table-dark" scope="col"> Prep Time </th>    
            </tr>
        </thead>
        
        <tbody>
            {% for d in dishes %}
            <tr>
                <td> {{ d.name }} </td>
                <td> {{ d.prep_time }} </td>
                <td> {{ d.cook_time }} </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
